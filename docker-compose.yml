version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: inventarisatie_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: inventarisatie
      POSTGRES_PASSWORD: ${DB_PASSWORD:-geheim}
      POSTGRES_DB: inventarisatie
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventarisatie"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: migrate.Dockerfile
    container_name: inventarisatie_migrate
    environment:
      DATABASE_URL: postgresql://inventarisatie:${DB_PASSWORD:-geheim}@db:5432/inventarisatie?schema=public
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventarisatie_app
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgresql://inventarisatie:${DB_PASSWORD:-geheim}@db:5432/inventarisatie?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://inventory.zepta-nas.nl}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-winkel-pro-secret-change-in-production}
      BREVO_SMTP_USER: ${BREVO_SMTP_USER:-}
      BREVO_SMTP_KEY: ${BREVO_SMTP_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@winkel.nl}
      EMAIL_NAAM: ${EMAIL_NAAM:-WinkelPro}
      NODE_ENV: production
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy

  backup:
    image: postgres:16-alpine
    container_name: inventarisatie_backup
    restart: unless-stopped
    environment:
      PGPASSWORD: ${DB_PASSWORD:-geheim}
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c "
        apk add --no-cache rsync &&
        while true; do
          DATUM=$$(date +%Y-%m-%d_%H%M)
          BESTAND=/tmp/backup_$${DATUM}.sql
          pg_dump -h db -U inventarisatie inventarisatie > $${BESTAND} 2>/dev/null
          if [ -s $${BESTAND} ]; then
            rsync -a $${BESTAND} /backups/
            ls -t /backups/*.sql 2>/dev/null | tail -n +31 | xargs rm -f
            rm -f $${BESTAND}
          fi
          sleep 86400
        done
      "
    depends_on:
      - db

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: inventarisatie_net
