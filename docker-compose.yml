version: '3.9'

services:
  # PostgreSQL database
  db:
    image: postgres:16-alpine
    container_name: inventarisatie_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: inventarisatie
      POSTGRES_PASSWORD: geheim
      POSTGRES_DB: inventarisatie
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventarisatie"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Migraties + seed — lichtgewicht, bouwt de Next.js app NIET
  migrate:
    image: node:20-alpine
    container_name: inventarisatie_migrate
    working_dir: /app
    volumes:
      - ./prisma:/app/prisma
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
    environment:
      DATABASE_URL: postgresql://inventarisatie:geheim@db:5432/inventarisatie?schema=public
    command: >
      sh -c "
        apk add --no-cache openssl libc6-compat &&
        npm ci --ignore-scripts &&
        npx prisma generate &&
        npx prisma migrate deploy &&
        node prisma/seed.js
      "
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # Next.js applicatie
  app:
    build: .
    container_name: inventarisatie_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://inventarisatie:geheim@db:5432/inventarisatie?schema=public
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@winkel.nl}
      EMAIL_NAAM: ${EMAIL_NAAM:-WinkelPro}
      NODE_ENV: production
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy

  # Cron: stuur maandelijks rapport op de 1e van de maand om 08:00
  cron:
    image: curlimages/curl:latest
    container_name: inventarisatie_cron
    restart: unless-stopped
    depends_on:
      - app
    entrypoint: >
      sh -c "
        while true; do
          HOUR=$(date +%H)
          DAY=$(date +%d)
          if [ \"$$DAY\" = '01' ] && [ \"$$HOUR\" = '08' ]; then
            curl -s -X POST http://app:3000/api/rapportages \
              -H 'Content-Type: application/json' \
              -d '{\"type\":\"MAANDELIJKS\",\"stuurMail\":true}' || true
          fi
          sleep 3600
        done
      "

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: inventarisatie_net
